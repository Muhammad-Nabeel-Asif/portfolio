<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <!-- Apply the saved theme before paint to avoid a flash of the wrong theme.
         Defaults to dark when no preference has been stored. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isLight = stored === 'light';
          document.documentElement.classList.toggle('dark', !isLight);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', isLight ? '#fafafa' : '#09090b');
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="Portfolio of Muhammad Nabeel Asif, Senior Backend Engineer specializing in distributed systems, workflow orchestration, high-throughput pipelines, and Agentic AI architectures."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='m4 17 6-6-6-6'/%3E%3Cpath d='M12 19h8'/%3E%3C/svg%3E"
    />
    <title>Muhammad Nabeel Asif — Senior Backend Engineer</title>
    <!-- Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Muhammad Nabeel Asif — Senior Backend Engineer" />
    <meta
      property="og:description"
      content="Distributed systems, workflow orchestration, high-throughput pipelines & Agentic AI architectures."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
